<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>과학시간!</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000814;font-family:Arial}
canvas{position:fixed;inset:0}
#ui{
position:absolute;
width:100%;
top:20px;
text-align:center;
color:#fff;
z-index:10;
pointer-events:none;
}
#count{
font-size:70px;
font-weight:bold;
text-shadow:0 0 20px #fff;
}
#title{
margin-top:10px;
font-size:40px;
line-height:1.5;
text-shadow:0 0 15px #6fb4ff;
}
</style>
</head>
<body>

<canvas id="cv"></canvas>

<div id="ui">
<div id="count">5</div>
<div id="title">
과학시간!<br>
안녕하세요 이원근입니다 (-_-)
</div>
</div>

<script>

const cv=document.getElementById("cv");
const ctx=cv.getContext("2d");

function resize(){
cv.width=innerWidth;
cv.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const stars=[];
const atoms=[];
const waves=[];
const MAX=300;

const sun={
x:120,
y:120,
r:45
};

let beam=false;
let beamLen=0;

for(let i=0;i<400;i++){
stars.push({
x:Math.random()*innerWidth,
y:Math.random()*innerHeight,
r:Math.random()*2,
a:Math.random(),
v:0.01+Math.random()*0.02
});
}

let sec=5;

setInterval(()=>{

if(sec>0){

sec--;
count.textContent=sec;

if(sec===0){

beam=true;

for(let i=0;i<6;i++){

atoms.push({
x:sun.x,
y:sun.y,
vx:5,
vy:5,
rot:0
});

}

}

}

},1000);

function bg(){

let g=ctx.createLinearGradient(0,0,0,cv.height);
g.addColorStop(0,"#000814");
g.addColorStop(.5,"#07193f");
g.addColorStop(1,"#000");

ctx.fillStyle=g;
ctx.fillRect(0,0,cv.width,cv.height);

}

function drawStars(){

for(const s of stars){

s.a+=s.v;

if(s.a>1||s.a<0)s.v*=-1;

ctx.fillStyle=`rgba(255,255,255,${Math.abs(s.a)})`;
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();

}

}

function drawSun(){

ctx.save();
ctx.shadowColor="#FFD000";
ctx.shadowBlur=70;
ctx.fillStyle="#FFD73B";
ctx.beginPath();
ctx.arc(sun.x,sun.y,sun.r,0,Math.PI*2);
ctx.fill();
ctx.restore();

}

function drawBeam(){

if(!beam)return;

beamLen+=20;

ctx.save();

ctx.lineCap="round";
ctx.shadowBlur=100;
ctx.shadowColor="#6f63ff";

ctx.lineWidth=80;
ctx.strokeStyle="rgba(150,80,255,.2)";
ctx.beginPath();
ctx.moveTo(sun.x,sun.y);
ctx.lineTo(sun.x+beamLen,sun.y+beamLen);
ctx.stroke();

ctx.lineWidth=40;
ctx.strokeStyle="rgba(80,180,255,.6)";
ctx.beginPath();
ctx.moveTo(sun.x,sun.y);
ctx.lineTo(sun.x+beamLen,sun.y+beamLen);
ctx.stroke();

}
    function drawAtoms(){

    for(let i=atoms.length-1;i>=0;i--){

        const a=atoms[i];

        a.x+=a.vx;
        a.y+=a.vy;
        a.rot+=4;

        let hit=false;

        // 벽 충돌
        if(a.x<=8){
            a.x=8;
            a.vx=Math.abs(a.vx);
            hit=true;
        }

        if(a.x>=cv.width-8){
            a.x=cv.width-8;
            a.vx=-Math.abs(a.vx);
            hit=true;
        }

        if(a.y<=8){
            a.y=8;
            a.vy=Math.abs(a.vy);
            hit=true;
        }

        if(a.y>=cv.height-8){
            a.y=cv.height-8;
            a.vy=-Math.abs(a.vy);
            hit=true;
        }

        // 벽에 닿으면 새 원자 생성(최대 300개)
        if(hit && atoms.length<MAX){

            atoms.push({

                x:a.x,
                y:a.y,

                // 새 원자는 항상 ↘ 방향으로 출발
                vx:5,
                vy:5,

                rot:0

            });

        }

        ctx.save();

        ctx.translate(a.x,a.y);
        ctx.rotate(a.rot*Math.PI/180);

        ctx.shadowColor="#66FF99";
        ctx.shadowBlur=10;

        ctx.strokeStyle="#00FF99";
        ctx.lineWidth=2;

        ctx.beginPath();
        ctx.ellipse(0,0,18,7,0,0,Math.PI*2);
        ctx.stroke();

        ctx.beginPath();
        ctx.ellipse(0,0,7,18,0,0,Math.PI*2);
        ctx.stroke();

        ctx.fillStyle="#AAFF22";
        ctx.beginPath();
        ctx.arc(0,0,5,0,Math.PI*2);
        ctx.fill();

        ctx.restore();

    }

}
    // 클릭 파동
cv.addEventListener("click",e=>{

    waves.push({
        x:e.clientX,
        y:e.clientY,
        r:0,
        a:1
    });

});

function drawWaves(){

    for(let i=waves.length-1;i>=0;i--){

        const w=waves[i];

        w.r+=10;
        w.a-=0.02;

        ctx.beginPath();
        ctx.arc(w.x,w.y,w.r,0,Math.PI*2);

        ctx.lineWidth=8;
        ctx.strokeStyle=`rgba(80,180,255,${w.a})`;
        ctx.shadowColor="#55AAFF";
        ctx.shadowBlur=25;
        ctx.stroke();

        // 파동과 원자 충돌
        for(let j=atoms.length-1;j>=0;j--){

            const a=atoms[j];

            const dx=a.x-w.x;
            const dy=a.y-w.y;
            const d=Math.hypot(dx,dy);

            if(Math.abs(d-w.r)<12){

                if(Math.random()<0.8){

                    // 80% 삭제
                    atoms.splice(j,1);

                }else{

                    // 20% 방향 변경
                    const ang=Math.random()*Math.PI*2;

                    a.vx=Math.cos(ang)*5;
                    a.vy=Math.sin(ang)*5;

                }

            }

        }

        if(w.a<=0){

            waves.splice(i,1);

        }

    }

}

function animate(){

    requestAnimationFrame(animate);

    bg();
    drawStars();
    drawSun();
    drawBeam();
    drawAtoms();
    drawWaves();

}

animate();

</script>

</body>
</html>
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과학시간</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#08163d;
overflow:hidden;
}

#menu{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
text-align:center;
}

h1{
color:white;
font-size:55px;
margin-bottom:40px;
text-shadow:0 0 20px cyan;
}

button{
cursor:pointer;
}

#startBtn{

padding:18px 70px;
font-size:32px;

border:none;
border-radius:15px;

background:#1E88E5;
color:white;

transition:.3s;

}

#startBtn:hover{

background:#1565C0;
transform:scale(1.05);

}

#loading{

display:none;

color:white;

font-size:40px;

animation:blink 1s infinite;

}

#chapter{

display:none;

margin-top:30px;

}

.lesson{

display:block;

width:430px;

margin:12px auto;

padding:15px;

font-size:24px;

background:#2196F3;

color:white;

border:none;

border-radius:12px;

transition:.3s;

}

.lesson:hover{

background:#1976D2;
transform:scale(1.03);

}

@keyframes blink{

50%{
opacity:.3;
}

}
</style>

</head>

<body>

<div id="menu">

<h1>과학시간!</h1>

<button id="startBtn">시작</button>

<div id="loading">
로딩중...
</div>

<div id="chapter">

<button class="lesson">1단원 - 과학이란?</button>
<button class="lesson">2단원 - 물질의 상태 변화</button>
<button class="lesson">3단원 - 분자의 운동</button>
<button class="lesson">4단원 - 힘과 운동</button>
<button class="lesson">5단원 - 생물의 다양성</button>
<button class="lesson">6단원 - 지구계와 지권</button>

</div>

</div>

<script>

const startBtn=document.getElementById("startBtn");
const loading=document.getElementById("loading");
const chapter=document.getElementById("chapter");

startBtn.onclick=function(){

startBtn.style.display="none";

loading.style.display="block";

setTimeout(function(){

loading.style.display="none";

chapter.style.display="block";

},2000);

}

</script>

</body>
</html>
