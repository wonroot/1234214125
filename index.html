<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>과학시간</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#000;
font-family:Arial,sans-serif;
}

canvas{
position:fixed;
left:0;
top:0;
}

#menu{
position:absolute;
z-index:10;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
}

#title{
font-size:50px;
text-align:center;
text-shadow:0 0 20px #4db8ff;
}

#startBtn{

margin-top:40px;

padding:20px 80px;

font-size:35px;

border:0;
border-radius:15px;

background:#1687ff;
color:white;

cursor:pointer;

}

#loading{

display:none;

font-size:40px;

margin-top:30px;

}

#chapters{

display:none;

text-align:center;

}

.lesson{

display:block;

width:400px;

margin:12px;

padding:15px;

font-size:25px;

border:0;

border-radius:10px;

background:#167cff;

color:white;

}

</style>

</head>


<body>


<canvas id="space"></canvas>


<div id="menu">


<div id="title">

과학시간!<br>

안녕하세요 이원근입니다 (-_-)

</div>


<button id="startBtn">
시작
</button>


<div id="loading">
로딩중...
</div>


<div id="chapters">

<h1>중학교 1학년 1학기 과학</h1>

<button class="lesson">1단원 과학이란?</button>
<button class="lesson">2단원 물질의 상태 변화</button>
<button class="lesson">3단원 분자의 운동</button>
<button class="lesson">4단원 힘과 운동</button>
<button class="lesson">5단원 생물의 다양성</button>
<button class="lesson">6단원 지구계와 지권</button>

</div>


</div>


<script>


const canvas=document.getElementById("space");
const ctx=canvas.getContext("2d");


function resize(){

canvas.width=innerWidth;
canvas.height=innerHeight;

}

resize();

window.onresize=resize;



const stars=[];


for(let i=0;i<300;i++){

stars.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:Math.random()*2

});

}



function drawSpace(){

ctx.fillStyle="#000814";

ctx.fillRect(0,0,canvas.width,canvas.height);



for(let s of stars){

ctx.fillStyle="white";

ctx.beginPath();

ctx.arc(s.x,s.y,s.r,0,Math.PI*2);

ctx.fill();

}


}



let play=true;


function animation(){

if(!play)return;


drawSpace();


requestAnimationFrame(animation);

}


animation();
    const atoms=[];

const MAX_ATOMS=300;


const sun={

x:120,
y:120,
r:45

};


let beam=false;
let beamSize=0;


// 5초 카운트다운

let time=5;


const timer=setInterval(()=>{

time--;

if(time<=0){

clearInterval(timer);

beam=true;


// 원자 6개 생성

for(let i=0;i<6;i++){

atoms.push({

x:sun.x,
y:sun.y,

vx:5,
vy:5,

rot:0

});

}

}


},1000);



// 태양

function drawSun(){

ctx.save();

ctx.shadowColor="#ffd000";
ctx.shadowBlur=60;

ctx.fillStyle="#ffd83d";

ctx.beginPath();

ctx.arc(
sun.x,
sun.y,
sun.r,
0,
Math.PI*2
);

ctx.fill();

ctx.restore();

}



// 감마선

function drawBeam(){

if(!beam)return;


beamSize+=15;


ctx.save();


ctx.lineCap="round";

ctx.shadowBlur=80;

ctx.shadowColor="#8b5cff";


// 보라색

ctx.strokeStyle="rgba(160,60,255,.35)";

ctx.lineWidth=90;

ctx.beginPath();

ctx.moveTo(
sun.x,
sun.y
);

ctx.lineTo(
sun.x+beamSize,
sun.y+beamSize
);

ctx.stroke();



// 파란색

ctx.strokeStyle="rgba(50,150,255,.7)";

ctx.lineWidth=45;

ctx.beginPath();

ctx.moveTo(
sun.x,
sun.y
);

ctx.lineTo(
sun.x+beamSize,
sun.y+beamSize
);

ctx.stroke();


ctx.restore();

}



// 원자

function drawAtoms(){


for(let a of atoms){


a.x+=a.vx;

a.y+=a.vy;



let hit=false;


// 벽 충돌

if(a.x<10 || a.x>canvas.width-10){

a.vx*=-1;

hit=true;

}


if(a.y<10 || a.y>canvas.height-10){

a.vy*=-1;

hit=true;

}



// 벽 충돌 시 증가

if(hit && atoms.length<MAX_ATOMS){


atoms.push({

x:a.x,

y:a.y,

vx:5,

vy:5,

rot:0

});


}



ctx.save();


ctx.translate(a.x,a.y);

ctx.rotate(a.rot);


ctx.strokeStyle="#00ff99";

ctx.lineWidth=3;


ctx.beginPath();

ctx.ellipse(
0,
0,
18,
8,
0,
0,
Math.PI*2
);

ctx.stroke();


ctx.fillStyle="#aaff00";

ctx.beginPath();

ctx.arc(
0,
0,
5,
0,
Math.PI*2
);

ctx.fill();



ctx.restore();


}


}



// 기존 애니메이션에 추가

function animation(){


if(!play)return;


drawSpace();

drawSun();

drawBeam();

drawAtoms();


requestAnimationFrame(animation);


}


animation();
    // 클릭 파동

const waves=[];


canvas.addEventListener("click",e=>{


waves.push({

x:e.clientX,

y:e.clientY,

r:0,

a:1

});


});



// 파동 그리기 + 원자 충돌

function drawWaves(){


for(let i=waves.length-1;i>=0;i--){


let w=waves[i];


w.r+=12;

w.a-=0.02;



ctx.beginPath();

ctx.arc(
w.x,
w.y,
w.r,
0,
Math.PI*2
);


ctx.lineWidth=8;

ctx.strokeStyle=
`rgba(50,180,255,${w.a})`;

ctx.shadowColor="#00aaff";

ctx.shadowBlur=30;

ctx.stroke();



// 원자 충돌

for(let j=atoms.length-1;j>=0;j--){


let a=atoms[j];


let d=Math.hypot(
a.x-w.x,
a.y-w.y
);



if(Math.abs(d-w.r)<15){


// 80% 삭제

if(Math.random()<0.8){

atoms.splice(j,1);


}


// 20% 방향 변경

else{


let angle=Math.random()*Math.PI*2;


a.vx=Math.cos(angle)*5;

a.vy=Math.sin(angle)*5;


}



}


}



if(w.a<=0){

waves.splice(i,1);

}


}


}




// 시작 버튼 동작

const startBtn=document.getElementById("startBtn");

const loading=document.getElementById("loading");

const chapters=document.getElementById("chapters");



startBtn.onclick=()=>{


startBtn.style.display="none";


loading.style.display="block";



setTimeout(()=>{


// 우주 애니메이션 정지

play=false;


// 캔버스 제거

canvas.style.display="none";



// 로딩 제거

loading.style.display="none";



// 단원만 표시

document.getElementById("title").style.display="none";

chapters.style.display="block";



},2000);



};



// 최종 애니메이션

function animation(){


if(!play)return;


drawSpace();

drawSun();

drawBeam();

drawAtoms();

drawWaves();


requestAnimationFrame(animation);


}


animation();

</script>

</body>

</html>
