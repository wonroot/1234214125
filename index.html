<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>과학시간!</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
width:100%;
height:100%;
overflow:hidden;
background:#02030d;
font-family:Arial,sans-serif;
}
canvas{
position:absolute;
left:0;
top:0;
}
#ui{
position:absolute;
width:100%;
text-align:center;
color:#fff;
pointer-events:none;
z-index:10;
}
#count{
margin-top:20px;
font-size:70px;
font-weight:bold;
text-shadow:0 0 20px #fff;
}
#title{
margin-top:10px;
font-size:42px;
line-height:1.5;
text-shadow:0 0 15px #8ab6ff;
}
</style>

</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
<div id="count">5</div>
<div id="title">
과학시간!<br>
안녕하세요 이원근입니다 (-_-)
</div>
</div>

<script>

const c=document.getElementById("c");
const x=c.getContext("2d");

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const stars=[];
const waves=[];
const atoms=[];

const MAX=300;

const sun={
x:120,
y:120,
r:45
};

let beam=false;
let beamLength=0;

for(let i=0;i<500;i++){

stars.push({

x:Math.random()*innerWidth,
y:Math.random()*innerHeight,
r:Math.random()*2+0.5,
a:Math.random(),
s:0.01+Math.random()*0.03

});

}

let count=5;

const timer=setInterval(()=>{

count--;

document.getElementById("count").textContent=Math.max(count,0);

if(count<=0){

clearInterval(timer);

beam=true;

for(let i=0;i<6;i++){

atoms.push({

x:sun.x+Math.random()*20,
y:sun.y+Math.random()*20,
vx:4+Math.random()*2,
vy:4+Math.random()*2,
rot:Math.random()*360

});

}

}

},1000);

c.onclick=e=>{

waves.push({

x:e.clientX,
y:e.clientY,
r:0,
a:1

});

};

function bg(){

let g=x.createLinearGradient(0,0,0,c.height);

g.addColorStop(0,"#000814");
g.addColorStop(.5,"#08163d");
g.addColorStop(1,"#000");

x.fillStyle=g;
x.fillRect(0,0,c.width,c.height);

}

function drawStars(){

for(const s of stars){

s.a+=s.s;

if(s.a>1||s.a<0)s.s*=-1;

x.beginPath();
x.fillStyle=`rgba(255,255,255,${Math.abs(s.a)})`;
x.arc(s.x,s.y,s.r,0,Math.PI*2);
x.fill();

}

}

function drawSun(){

x.save();

x.shadowColor="#FFD000";
x.shadowBlur=60;

x.fillStyle="#FFD633";

x.beginPath();
x.arc(sun.x,sun.y,sun.r,0,Math.PI*2);
x.fill();

x.restore();

}

function drawBeam(){

if(!beam)return;

if(beamLength<c.width)beamLength+=25;

x.save();

x.lineCap="round";
x.shadowBlur=120;
x.shadowColor="#7b5cff";

/* 바깥 */

x.lineWidth=90;
x.strokeStyle="rgba(120,80,255,.15)";
x.beginPath();
x.moveTo(sun.x,sun.y);
x.lineTo(
sun.x+beamLength,
sun.y+beamLength*0.6
);
x.stroke();

/* 중간 */

x.lineWidth=50;
x.strokeStyle="rgba(70,170,255,.55)";
x.beginPath();
x.moveTo(sun.x,sun.y);
x.lineTo(
sun.x+beamLength,
sun.y+beamLength*0.6
);
x.stroke();

/* 중심 */

x.lineWidth=20;
x.strokeStyle="#dfe8ff";
x.beginPath();
x.moveTo(sun.x,sun.y);
x.lineTo(
sun.x+beamLength,
sun.y+beamLength*0.6
);
x.stroke();

x.restore();

}
    function drawWaves(){

    for(let i=waves.length-1;i>=0;i--){

        const w=waves[i];

        w.r+=10;
        w.a-=0.02;

        x.beginPath();
        x.arc(w.x,w.y,w.r,0,Math.PI*2);

        x.lineWidth=8;
        x.strokeStyle=`rgba(80,180,255,${w.a})`;
        x.shadowColor="#55AAFF";
        x.shadowBlur=30;
        x.stroke();

        if(w.a<=0){
            waves.splice(i,1);
        }

    }

}

function drawAtoms(){

    for(const a of atoms){

        a.x+=a.vx;
        a.y+=a.vy;
        a.rot+=3;

        // 벽 충돌 → 새 원자 생성
        if(a.x<8||a.x>c.width-8){

            a.vx*=-1;

            if(atoms.length<MAX){

                atoms.push({

                    x:a.x,
                    y:a.y,
                    vx:4+Math.random()*2,
                    vy:4+Math.random()*2,
                    rot:0

                });

            }

        }

        if(a.y<8||a.y>c.height-8){

            a.vy*=-1;

            if(atoms.length<MAX){

                atoms.push({

                    x:a.x,
                    y:a.y,
                    vx:4+Math.random()*2,
                    vy:4+Math.random()*2,
                    rot:0

                });

            }

        }

        x.save();

        x.translate(a.x,a.y);
        x.rotate(a.rot*Math.PI/180);

        x.shadowColor="#66FFAA";
        x.shadowBlur=10;

        x.strokeStyle="#00FF99";
        x.lineWidth=2;

        x.beginPath();
        x.ellipse(0,0,18,7,0,0,Math.PI*2);
        x.stroke();

        x.beginPath();
        x.ellipse(0,0,7,18,0,0,Math.PI*2);
        x.stroke();

        x.fillStyle="#AAFF00";
        x.beginPath();
        x.arc(0,0,5,0,Math.PI*2);
        x.fill();

        x.restore();

    }

}

function loop(){

    requestAnimationFrame(loop);

    bg();
    drawStars();
    drawSun();
    drawBeam();
    drawWaves();
    drawAtoms();

}

loop();

</script>

</body>
</html>
