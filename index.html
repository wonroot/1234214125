<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>과학시간!</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#ffffff;
}

canvas{
    position:absolute;
    left:0;
    top:0;
}

#title{
    position:absolute;
    left:0;
    top:0;
    color:black;
    font-size:40px;
    font-family:Arial,sans-serif;
    font-weight:bold;
    z-index:100;
    user-select:none;
}
</style>

</head>
<body>

<div id="title">
과학시간!<br>
안녕하세요 이원근입니다 (-_-)
</div>

<canvas id="canvas"></canvas>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();
window.onresize=resize;

const atoms=[];
const MAX_ATOMS=1000;

function random(min,max){
    return Math.random()*(max-min)+min;
}

function createAtom(x,y,vx,vy){
    if(atoms.length>=MAX_ATOMS) return;

    atoms.push({
        x:x,
        y:y,
        vx:vx,
        vy:vy,
        r:8
    });
}

// 새로고침마다 랜덤한 시작 원자(1~10개)
const startCount=Math.floor(Math.random()*10)+1;

for(let i=0;i<startCount;i++){
    createAtom(
        random(20,window.innerWidth-20),
        random(20,window.innerHeight-20),
        random(-4,4),
        random(-4,4)
    );
}

function split(atom){
    if(atoms.length>=MAX_ATOMS) return;

    createAtom(
        atom.x,
        atom.y,
        random(-5,5),
        random(-5,5)
    );
}

function drawAtom(a){

    ctx.strokeStyle="#00aa00";
    ctx.lineWidth=2;

    ctx.beginPath();
    ctx.ellipse(a.x,a.y,18,8,0,0,Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.ellipse(a.x,a.y,8,18,0,0,Math.PI*2);
    ctx.stroke();

    ctx.fillStyle="#00cc00";
    ctx.beginPath();
    ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
    ctx.fill();
}

function update(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let atom of atoms){

        atom.x+=atom.vx;
        atom.y+=atom.vy;

        if(atom.x<atom.r){
            atom.x=atom.r;
            atom.vx*=-1;
            split(atom);
        }

        if(atom.x>canvas.width-atom.r){
            atom.x=canvas.width-atom.r;
            atom.vx*=-1;
            split(atom);
        }

        if(atom.y<atom.r){
            atom.y=atom.r;
            atom.vy*=-1;
            split(atom);
        }

        if(atom.y>canvas.height-atom.r){
            atom.y=canvas.height-atom.r;
            atom.vy*=-1;
            split(atom);
        }

        drawAtom(atom);
    }

    for(let i=0;i<atoms.length;i++){
        for(let j=i+1;j<atoms.length;j++){

            const a=atoms[i];
            const b=atoms[j];

            const dx=a.x-b.x;
            const dy=a.y-b.y;
            const d=Math.sqrt(dx*dx+dy*dy);

            if(d<a.r+b.r){

                split(a);
                split(b);

                let tx=a.vx;
                a.vx=b.vx;
                b.vx=tx;

                let ty=a.vy;
                a.vy=b.vy;
                b.vy=ty;
            }
        }
    }

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
