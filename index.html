<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>달걀 시바의 방</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"맑은 고딕",sans-serif;
}

body{
    background:#f5f5f5;
    overflow:hidden;
}

/* 왼쪽 위 메뉴 */
.menu{
    position:fixed;
    top:20px;
    left:20px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.menu button{
    width:120px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:white;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:.2s;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.menu button:hover{
    background:#ffe082;
    transform:translateX(5px);
}

/* 가운데 */
.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

h1{
    font-size:48px;
    margin-bottom:30px;
    color:#333;
}

/* 달걀 시바 */
.shiba{
    width:250px;
    height:250px;
    object-fit:contain;
    margin-bottom:30px;
}

.emoji{
    font-size:180px;
    margin-bottom:30px;
}

/* 시작 버튼 */
.start{
    padding:18px 60px;
    font-size:28px;
    border:none;
    border-radius:50px;
    background:#ff9800;
    color:white;
    cursor:pointer;
    transition:.2s;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
}

.start:hover{
    transform:scale(1.08);
    background:#ff6f00;
}
</style>

</head>
<body>

<!-- 왼쪽 위 메뉴 -->
<div class="menu">
    <button>1단원</button>
    <button>2단원</button>
    <button>3단원</button>
    <button>4단원</button>
    <button>5단원</button>
    <button>6단원</button>
    <button>7단원</button>
    <button>8단원</button>
</div>

<!-- 메인 -->
<div class="container">

    <h1>달걀 시바의 방입니다</h1>

    <!-- 이미지가 있으면 표시 -->
    <img src="egg-shiba.png"
         class="shiba"
         onerror="this.style.display='none';document.getElementById('emoji').style.display='block';">

    <!-- 이미지가 없으면 이모지 -->
    <div id="emoji" class="emoji" style="display:none;">🥚🐕</div>

    <button class="start" onclick="start()">시작하기</button>

</div>

<script>
function start(){
    alert("시작합니다!");
}
</script>

</body>
</html>
