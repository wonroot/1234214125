<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과학시간 홈페이지</title>
    <style>
        body {
            margin: 0;
            font-family: "Malgun Gothic", sans-serif;
            background: linear-gradient(to right, #87CEEB, #E0F7FA);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #0077cc;
        }

        p {
            font-size: 22px;
            color: #333;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>환영합니다!</h1>
        <p>
            저는 <strong>이원근</strong> 학생입니다.<br>
            <strong>아화중학교</strong>에 다녀요.<br><br>
            <strong>과학시간에 만든 홈페이지입니다.</strong>
        </p>
    </div>

</body>
</html>
