<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>과학시간!</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:black;
font-family:Arial,sans-serif;
}

canvas{
position:fixed;
left:0;
top:0;
}

#menu{
position:absolute;
z-index:10;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

#title{
font-size:45px;
text-align:center;
text-shadow:0 0 20px cyan;
}

#startBtn{

margin-top:40px;

padding:20px 70px;

font-size:30px;

border:0;

border-radius:15px;

background:#087cff;

color:white;

cursor:pointer;

}


#loading{

display:none;

font-size:40px;

margin-top:30px;

}


#chapters{

display:none;

text-align:center;

}


.lesson{

display:block;

width:420px;

margin:10px;

padding:15px;

font-size:25px;

border:0;

border-radius:10px;

background:#087cff;

color:white;

}

</style>

</head>


<body>


<canvas id="space"></canvas>


<div id="menu">


<div id="title">

과학시간!<br>

안녕하세요 이원근입니다 (-_-)

</div>


<button id="startBtn">
시작
</button>


<div id="loading">
로딩중...
</div>


<div id="chapters">

<h1>
중학교 1학년 1학기 과학
</h1>

<button class="lesson">1단원 과학이란?</button>
<button class="lesson">2단원 물질의 상태 변화</button>
<button class="lesson">3단원 분자의 운동</button>
<button class="lesson">4단원 힘과 운동</button>
<button class="lesson">5단원 생물의 다양성</button>
<button class="lesson">6단원 지구계와 지권</button>

</div>


</div>


<script>


const space=document.getElementById("space");

const ctx=space.getContext("2d");


function resize(){

space.width=innerWidth;

space.height=innerHeight;

}

resize();

window.addEventListener("resize",resize);



const stars=[];


for(let i=0;i<300;i++){

stars.push({

x:Math.random()*space.width,

y:Math.random()*space.height,

r:Math.random()*2

});

}



function drawSpace(){


ctx.fillStyle="#000814";

ctx.fillRect(
0,
0,
space.width,
space.height
);



for(let s of stars){

ctx.fillStyle="white";

ctx.beginPath();

ctx.arc(
s.x,
s.y,
s.r,
0,
Math.PI*2
);

ctx.fill();

}


}


// Part 2에서 이어짐

    // ==========================
// Part 2
// 태양 + 카운트다운 + 감마선 + 원자
// ==========================


const atoms=[];

const MAX_ATOMS=300;


const sun={

x:120,

y:120,

r:45

};


let beam=false;

let beamSize=0;



// 카운트다운

let count=5;


const countTimer=setInterval(()=>{


count--;


if(count<=0){


clearInterval(countTimer);


beam=true;


// 원자 6개 생성

for(let i=0;i<6;i++){


atoms.push({

x:sun.x,

y:sun.y,

vx:5,

vy:5,

rot:0

});


}


}


},1000);




// 태양 그리기

function drawSun(){


ctx.save();


ctx.shadowColor="#ffd000";

ctx.shadowBlur=70;


ctx.fillStyle="#ffd83d";


ctx.beginPath();


ctx.arc(

sun.x,

sun.y,

sun.r,

0,

Math.PI*2

);


ctx.fill();


ctx.restore();


}



// 감마선

function drawBeam(){


if(!beam)return;


beamSize+=15;


ctx.save();


ctx.lineCap="round";

ctx.shadowBlur=80;

ctx.shadowColor="#7b4cff";



// 보라색

ctx.strokeStyle="rgba(170,60,255,0.35)";

ctx.lineWidth=90;


ctx.beginPath();

ctx.moveTo(

sun.x,

sun.y

);

ctx.lineTo(

sun.x+beamSize,

sun.y+beamSize

);

ctx.stroke();



// 파란색

ctx.strokeStyle="rgba(50,150,255,0.7)";

ctx.lineWidth=45;


ctx.beginPath();

ctx.moveTo(

sun.x,

sun.y

);

ctx.lineTo(

sun.x+beamSize,

sun.y+beamSize

);

ctx.stroke();


ctx.restore();


}



// 원자 움직임

function drawAtoms(){


for(let i=atoms.length-1;i>=0;i--){


const a=atoms[i];


a.x+=a.vx;

a.y+=a.vy;


let hit=false;



// 벽 충돌

if(a.x<10 || a.x>space.width-10){

a.vx*=-1;

hit=true;

}


if(a.y<10 || a.y>space.height-10){

a.vy*=-1;

hit=true;

}




// 벽 충돌시 원자 증가

if(hit && atoms.length<MAX_ATOMS){


atoms.push({

x:a.x,

y:a.y,

vx:5,

vy:5,

rot:0

});


}




// 원자 그림

ctx.save();


ctx.translate(a.x,a.y);


ctx.rotate(a.rot);


ctx.strokeStyle="#00ff99";

ctx.lineWidth=3;



ctx.beginPath();

ctx.ellipse(

0,

0,

18,

8,

0,

0,

Math.PI*2

);

ctx.stroke();



ctx.fillStyle="#aaff00";


ctx.beginPath();

ctx.arc(

0,

0,

5,

0,

Math.PI*2

);

ctx.fill();


ctx.restore();


}

}


// Part 3에서 이어짐

    // ==========================
// Part 3
// 파동 + 시작버튼 + 최종 실행
// ==========================


const waves=[];


// 클릭 파동

space.addEventListener("click",e=>{


waves.push({

x:e.clientX,

y:e.clientY,

r:0,

a:1

});


});




// 파동 그리기 + 원자 반응

function drawWaves(){


for(let i=waves.length-1;i>=0;i--){


const w=waves[i];


w.r+=10;

w.a-=0.02;



ctx.beginPath();


ctx.arc(

w.x,

w.y,

w.r,

0,

Math.PI*2

);


ctx.lineWidth=8;


ctx.strokeStyle=

`rgba(50,180,255,${w.a})`;


ctx.shadowColor="#00aaff";

ctx.shadowBlur=30;


ctx.stroke();





// 원자 충돌

for(let j=atoms.length-1;j>=0;j--){


const a=atoms[j];


const d=Math.hypot(

a.x-w.x,

a.y-w.y

);



if(Math.abs(d-w.r)<15){



// 80% 삭제

if(Math.random()<0.8){


atoms.splice(j,1);


}


// 20% 방향 변경

else{


const angle=Math.random()*Math.PI*2;


a.vx=Math.cos(angle)*5;

a.vy=Math.sin(angle)*5;


}


}


}



if(w.a<=0){

waves.splice(i,1);

}


}


}




// 시작 버튼

const startBtn=document.getElementById("startBtn");

const loading=document.getElementById("loading");

const chapters=document.getElementById("chapters");


let running=true;



startBtn.onclick=()=>{


startBtn.style.display="none";


loading.style.display="block";



setTimeout(()=>{


// 우주 정지

running=false;


// 화면 제거

space.style.display="none";



// 메뉴 변경

document.getElementById("title").style.display="none";


loading.style.display="none";


chapters.style.display="block";


},2000);


};




// 최종 애니메이션

function mainLoop(){


if(running){


drawSpace();


drawSun();


drawBeam();


drawAtoms();


drawWaves();


}


requestAnimationFrame(mainLoop);


}


mainLoop();


</script>

</body>
</html>
