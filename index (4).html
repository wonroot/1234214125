<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우주 홈페이지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #05040d;
    overflow: hidden;
    cursor: crosshair;
  }
  #space {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #intro-content {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    z-index: 5;
    transition: opacity 0.6s ease, filter 0.6s ease;
  }
  #intro-content.hide {
    opacity: 0;
    filter: blur(6px);
    pointer-events: none;
  }
  #center-title {
    text-align: center;
    font-family: 'Orbitron', 'Segoe UI', sans-serif;
    font-weight: 900;
    letter-spacing: 0.35em;
    font-size: clamp(28px, 6vw, 64px);
    background: linear-gradient(90deg, #7f5cff, #4fc9ff, #ff6ad5, #7f5cff);
    background-size: 300% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 18px rgba(150, 110, 255, 0.65)) drop-shadow(0 0 34px rgba(80, 180, 255, 0.35));
    animation: galaxyShift 6s ease-in-out infinite;
    pointer-events: none;
    user-select: none;
    margin: 0;
  }
  #subtitle {
    font-family: 'Share Tech Mono', 'Consolas', monospace;
    letter-spacing: 0.5em;
    font-size: clamp(11px, 1.6vw, 15px);
    color: #6df3ff;
    text-shadow: 0 0 10px rgba(109, 243, 255, 0.9), 0 0 22px rgba(109, 243, 255, 0.5);
    pointer-events: none;
    user-select: none;
  }
  #enter-btn {
    margin-top: 10px;
    padding: 14px 38px;
    background: rgba(10, 8, 20, 0.55);
    border: 1px solid #6df3ff;
    color: #d9f9ff;
    font-family: 'Share Tech Mono', 'Consolas', monospace;
    font-size: 15px;
    letter-spacing: 0.25em;
    cursor: pointer;
    clip-path: polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px);
    box-shadow: 0 0 12px rgba(109, 243, 255, 0.55), inset 0 0 12px rgba(109, 243, 255, 0.15);
    text-shadow: 0 0 8px rgba(109, 243, 255, 0.9);
    transition: all 0.25s ease;
  }
  #enter-btn:hover {
    background: rgba(109, 243, 255, 0.12);
    border-color: #ff6ad5;
    color: #fff;
    box-shadow: 0 0 20px rgba(255, 106, 213, 0.75), inset 0 0 18px rgba(255, 106, 213, 0.25);
    text-shadow: 0 0 10px rgba(255, 106, 213, 0.9);
    letter-spacing: 0.32em;
  }
  #enter-btn:active {
    transform: scale(0.96);
  }

  @keyframes galaxyShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ---------- 메인 화면 (사이버펑크) ---------- */
  #main-screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 8vh;
    background: radial-gradient(ellipse at 50% 20%, #12082b 0%, #05030c 65%, #020106 100%);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.7s ease;
    overflow: hidden;
    z-index: 10;
  }
  #main-screen.show {
    opacity: 1;
    pointer-events: auto;
  }
  .grid-floor {
    position: absolute;
    left: -50%;
    right: -50%;
    bottom: 0;
    height: 55%;
    background-image:
      linear-gradient(rgba(109, 243, 255, 0.35) 1px, transparent 1px),
      linear-gradient(90deg, rgba(109, 243, 255, 0.35) 1px, transparent 1px);
    background-size: 60px 60px;
    transform: perspective(320px) rotateX(62deg);
    transform-origin: bottom;
    mask-image: linear-gradient(to top, rgba(0,0,0,0.9), transparent 90%);
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.9), transparent 90%);
    animation: gridScroll 2.4s linear infinite;
  }
  @keyframes gridScroll {
    0%   { background-position: 0 0, 0 0; }
    100% { background-position: 0 60px, 0 0; }
  }
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255, 255, 255, 0.035) 0px,
      rgba(255, 255, 255, 0.035) 1px,
      transparent 2px,
      transparent 4px
    );
    pointer-events: none;
  }
  .side-panel {
    position: absolute;
    left: 3.5vw;
    top: 50%;
    transform: translateY(-50%);
    width: clamp(230px, 20vw, 300px);
    padding: 20px 18px;
    background: rgba(8, 6, 18, 0.55);
    border: 1px solid rgba(109, 243, 255, 0.45);
    box-shadow: 0 0 18px rgba(109, 243, 255, 0.2), inset 0 0 18px rgba(109, 243, 255, 0.08);
    clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
    font-family: 'Share Tech Mono', monospace;
    z-index: 2;
  }
  .side-panel-title {
    color: #ff6ad5;
    font-size: 13px;
    letter-spacing: 0.3em;
    text-shadow: 0 0 8px rgba(255, 106, 213, 0.8);
    margin-bottom: 16px;
  }
  .side-panel-menu {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .side-panel-menu li {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 10px 10px;
    border-left: 2px solid rgba(109, 243, 255, 0.25);
    color: rgba(216, 244, 255, 0.6);
    font-size: 12.5px;
    letter-spacing: 0.03em;
    line-height: 1.4;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .side-panel-menu li:hover {
    border-left-color: #6df3ff;
    background: rgba(109, 243, 255, 0.08);
    color: #eafcff;
  }
  .side-panel-menu li.active {
    border-left-color: #ff6ad5;
    background: rgba(255, 106, 213, 0.1);
    color: #ffffff;
  }
  .side-panel-menu li.active .unit-roman {
    color: #ff6ad5;
    text-shadow: 0 0 8px rgba(255, 106, 213, 0.85);
  }
  .unit-roman {
    flex-shrink: 0;
    width: 26px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: #6df3ff;
    text-shadow: 0 0 6px rgba(109, 243, 255, 0.7);
  }
  .unit-name {
    flex: 1;
  }

  .main-inner {
    position: relative;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  .main-eyebrow {
    font-family: 'Share Tech Mono', monospace;
    color: #ff6ad5;
    letter-spacing: 0.4em;
    font-size: 13px;
    text-shadow: 0 0 10px rgba(255, 106, 213, 0.8);
  }
  .main-heading {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(32px, 7vw, 72px);
    letter-spacing: 0.12em;
    color: #eafcff;
    text-shadow:
      0 0 8px rgba(109, 243, 255, 0.9),
      2px 0 #ff6ad5,
      -2px 0 #6df3ff;
    animation: glitchText 4.5s infinite;
  }
  @keyframes glitchText {
    0%, 92%, 100% { text-shadow: 0 0 8px rgba(109,243,255,0.9), 2px 0 #ff6ad5, -2px 0 #6df3ff; transform: translate(0,0); }
    93% { text-shadow: 0 0 8px rgba(109,243,255,0.9), -3px 0 #ff6ad5, 3px 0 #6df3ff; transform: translate(-2px,1px); }
    95% { text-shadow: 0 0 8px rgba(109,243,255,0.9), 3px 1px #ff6ad5, -3px -1px #6df3ff; transform: translate(2px,-1px); }
    97% { transform: translate(0,0); }
  }
  .main-heading.glitch-burst {
    animation: glitchBurst 0.5s steps(1, end) 1 !important;
  }
  @keyframes glitchBurst {
    0%   { transform: translate(0,0) skewX(0); text-shadow: 0 0 8px rgba(109,243,255,0.9), 2px 0 #ff6ad5, -2px 0 #6df3ff; opacity: 1; }
    6%   { transform: translate(-10px,3px) skewX(10deg); text-shadow: 6px 0 #ff2bd6, -6px 0 #2bf0ff; opacity: 0.75; }
    12%  { transform: translate(9px,-4px) skewX(-8deg); text-shadow: -7px 1px #ff2bd6, 7px -1px #2bf0ff; opacity: 1; }
    18%  { transform: translate(-7px,5px); text-shadow: 5px 3px #ff2bd6, -5px -3px #2bf0ff; opacity: 0.5; }
    24%  { transform: translate(8px,-3px) skewX(9deg); text-shadow: -6px 0 #2bf0ff, 6px 0 #ff2bd6; opacity: 1; }
    30%  { transform: translate(-4px,2px) skewX(-6deg); opacity: 0.8; }
    36%  { transform: translate(6px,-5px); text-shadow: 8px 0 #ff2bd6, -8px 0 #2bf0ff; opacity: 0.4; }
    42%  { transform: translate(-9px,4px) skewX(7deg); opacity: 1; }
    50%  { transform: translate(3px,-2px); text-shadow: -4px 2px #2bf0ff, 4px -2px #ff2bd6; opacity: 0.7; }
    58%  { transform: translate(-6px,3px) skewX(-9deg); opacity: 1; }
    66%  { transform: translate(5px,-4px); text-shadow: 6px -1px #ff2bd6, -6px 1px #2bf0ff; opacity: 0.55; }
    74%  { transform: translate(-3px,2px) skewX(5deg); opacity: 1; }
    82%  { transform: translate(4px,-2px); text-shadow: -3px 0 #2bf0ff, 3px 0 #ff6ad5; opacity: 0.85; }
    90%  { transform: translate(-2px,1px); opacity: 1; }
    100% { transform: translate(0,0) skewX(0); text-shadow: 0 0 8px rgba(109,243,255,0.9), 2px 0 #ff6ad5, -2px 0 #6df3ff; opacity: 1; }
  }
  .main-inner.shake {
    animation: screenShake 0.5s linear 1;
  }
  @keyframes screenShake {
    0%, 100% { transform: translate(0,0); }
    10% { transform: translate(-5px,3px); }
    20% { transform: translate(6px,-4px); }
    30% { transform: translate(-7px,-2px); }
    40% { transform: translate(5px,4px); }
    50% { transform: translate(-4px,-5px); }
    60% { transform: translate(6px,2px); }
    70% { transform: translate(-3px,-4px); }
    80% { transform: translate(4px,3px); }
    90% { transform: translate(-2px,1px); }
  }
  .scanlines.glitch-flicker {
    animation: noiseFlicker 0.5s steps(4, end) 1;
  }
  @keyframes noiseFlicker {
    0%, 100% { opacity: 1; }
    15% { opacity: 0.15; background-color: rgba(109,243,255,0.06); }
    30% { opacity: 1; background-color: transparent; }
    45% { opacity: 0.1; background-color: rgba(255,106,213,0.08); }
    60% { opacity: 0.9; background-color: transparent; }
    75% { opacity: 0.2; }
    90% { opacity: 1; }
  }
  .main-desc {
    font-family: 'Share Tech Mono', monospace;
    color: rgba(216, 244, 255, 0.7);
    letter-spacing: 0.08em;
    font-size: 14px;
  }
  #back-btn {
    margin-top: 16px;
    padding: 10px 26px;
    background: transparent;
    border: 1px solid rgba(109, 243, 255, 0.6);
    color: #9fefff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  #back-btn:hover {
    border-color: #ff6ad5;
    color: #ffd7f2;
    box-shadow: 0 0 14px rgba(255, 106, 213, 0.5);
  }

  #flash-overlay {
    position: fixed;
    inset: 0;
    background: #eaf9ff;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
  }
  #flash-overlay.flash-active {
    animation: flashPulse 0.5s ease-out forwards;
  }
  @keyframes flashPulse {
    0%   { opacity: 0.85; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>
<canvas id="space"></canvas>

<div id="intro-content">
  <div id="center-title">SCIENCE</div>
  <div id="subtitle">LAUNCH INTO SPACE</div>
  <button id="enter-btn">LAUNCH INTO SPACE</button>
</div>

<div id="main-screen">
  <div class="grid-floor"></div>
  <div class="scanlines"></div>
  <div class="side-panel">
    <div class="side-panel-title">UNIT SELECT</div>
    <ul class="side-panel-menu" id="unit-menu">
      <li data-roman="I" data-title="과학과 인류의 지속가능한 삶"><span class="unit-roman">I</span><span class="unit-name">과학과 인류의 지속가능한 삶</span></li>
      <li data-roman="II" data-title="생물의 구성과 다양성"><span class="unit-roman">II</span><span class="unit-name">생물의 구성과 다양성</span></li>
      <li data-roman="III" data-title="열"><span class="unit-roman">III</span><span class="unit-name">열</span></li>
      <li data-roman="IV" data-title="물질의 상태의 변화"><span class="unit-roman">IV</span><span class="unit-name">물질의 상태의 변화</span></li>
      <li data-roman="V" data-title="힘의 작용"><span class="unit-roman">V</span><span class="unit-name">힘의 작용</span></li>
      <li data-roman="VI" data-title="기체의 성질"><span class="unit-roman">VI</span><span class="unit-name">기체의 성질</span></li>
      <li data-roman="VII" data-title="태양계"><span class="unit-roman">VII</span><span class="unit-name">태양계</span></li>
    </ul>
  </div>
  <div class="main-inner">
    <div class="main-eyebrow">// SYSTEM ONLINE</div>
    <h1 class="main-heading" data-text="MAIN SCREEN">MAIN SCREEN</h1>
    <p class="main-desc">여기에 메인 화면 콘텐츠를 채워보세요.</p>
    <button id="back-btn">← 돌아가기</button>
  </div>
</div>

<div id="flash-overlay"></div>

<script>
const canvas = document.getElementById('space');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ---------- 배경 별(트윙클) ----------
const bgStars = [];
const BG_STAR_COUNT = 220;
for (let i = 0; i < BG_STAR_COUNT; i++) {
  bgStars.push({
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 1.4 + 0.3,
    phase: Math.random() * Math.PI * 2,
    speed: 0.5 + Math.random() * 1.2
  });
}

function drawNebula(t) {
  // 배경 베이스
  ctx.fillStyle = '#05040d';
  ctx.fillRect(0, 0, W, H);

  // 은은한 성운 그라디언트 두어 개
  const g1 = ctx.createRadialGradient(W * 0.2, H * 0.15, 0, W * 0.2, H * 0.15, W * 0.6);
  g1.addColorStop(0, 'rgba(120, 60, 200, 0.20)');
  g1.addColorStop(1, 'rgba(120, 60, 200, 0)');
  ctx.fillStyle = g1;
  ctx.fillRect(0, 0, W, H);

  const g2 = ctx.createRadialGradient(W * 0.8, H * 0.75, 0, W * 0.8, H * 0.75, W * 0.55);
  g2.addColorStop(0, 'rgba(40, 90, 190, 0.18)');
  g2.addColorStop(1, 'rgba(40, 90, 190, 0)');
  ctx.fillStyle = g2;
  ctx.fillRect(0, 0, W, H);

  const g3 = ctx.createRadialGradient(W * 0.5, H * 0.9, 0, W * 0.5, H * 0.9, W * 0.5);
  g3.addColorStop(0, 'rgba(200, 60, 140, 0.10)');
  g3.addColorStop(1, 'rgba(200, 60, 140, 0)');
  ctx.fillStyle = g3;
  ctx.fillRect(0, 0, W, H);
}

function drawBgStars(t) {
  for (const s of bgStars) {
    const alpha = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(t * 0.001 * s.speed + s.phase));
    ctx.beginPath();
    ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ---------- 유성 ----------
const meteors = [];
let meteorSpawnTimer = 0;
let nextMeteorIn = 1500 + Math.random() * 2500;

function spawnMeteor() {
  const fromTop = Math.random() < 0.7;
  const startX = fromTop ? Math.random() * W : -40;
  const startY = fromTop ? -40 : Math.random() * H * 0.5;
  const angle = (24 + Math.random() * 18) * Math.PI / 180; // 오른쪽 아래로 비스듬히
  const speed = 620 + Math.random() * 380;
  meteors.push({
    x: startX,
    y: startY,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    len: 90 + Math.random() * 90,
    life: 1
  });
}

function updateAndDrawMeteors(dt) {
  meteorSpawnTimer += dt;
  if (meteorSpawnTimer >= nextMeteorIn) {
    meteorSpawnTimer = 0;
    nextMeteorIn = 1500 + Math.random() * 3000;
    spawnMeteor();
  }

  for (let i = meteors.length - 1; i >= 0; i--) {
    const m = meteors[i];
    m.x += (m.vx * dt) / 1000;
    m.y += (m.vy * dt) / 1000;

    const dirLen = Math.hypot(m.vx, m.vy) || 1;
    const tailX = m.x - (m.vx / dirLen) * m.len;
    const tailY = m.y - (m.vy / dirLen) * m.len;

    ctx.save();
    const grad = ctx.createLinearGradient(m.x, m.y, tailX, tailY);
    grad.addColorStop(0, 'rgba(255,255,255,0.95)');
    grad.addColorStop(0.4, 'rgba(190,220,255,0.55)');
    grad.addColorStop(1, 'rgba(190,220,255,0)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.shadowBlur = 14;
    ctx.shadowColor = 'rgba(210,230,255,0.9)';
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(tailX, tailY);
    ctx.stroke();

    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(m.x, m.y, 1.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    if (m.x - W * 0.15 > W || m.y - H * 0.15 > H) {
      meteors.splice(i, 1);
    }
  }
}

// ---------- 좌측 상단 대각선 별 + 카운트다운 + 감마선 ----------
const STAR_MARGIN = 80; // 화면 가장자리와의 최소 여백
let starX = W * 0.12;
let starY = H * 0.12;
const STAR_POS = { x: () => starX, y: () => starY };
const COUNTDOWN_SECONDS = 2;
const STAR_FADE_IN_MS = 800; // 별이 등장할 때 옅었다가 진해지는 시간
const BEAM_ANGLE = (38 * Math.PI) / 180; // 좌상단에서 우하단 대각선 방향
const BEAM_SPEED = 1400; // px/sec

let state = 'counting'; // counting -> bursting -> beaming -> fading -> counting(재시작)
let stateTime = 0;      // 현재 state로 진입한 후 경과 시간(ms)
let countdownValue = COUNTDOWN_SECONDS;
let beam = null;

// ---------- 감마선 옆으로 튀는 점(파티클) ----------
const sideDots = [];
const SIDE_DOT_MAX = 160;      // 성능 보호용 상한
const SIDE_DOT_EMIT_MS = 90;   // 이 간격마다 감마선 옆에서 점 하나 생성
const SIDE_DOT_LIFESPAN = 7000; // ms, 오래 지나면 서서히 소멸

function spawnSideDot(x, y, baseAngle) {
  const spread = (Math.random() - 0.5) * Math.PI * 0.9; // 감마선 진행방향 기준 옆으로 퍼짐
  const angle = baseAngle + Math.PI / 2 * (Math.random() < 0.5 ? 1 : -1) + spread * 0.4;
  const speed = 90 + Math.random() * 140;
  sideDots.push({
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    r: 2.4,
    born: performance.now(),
    hue: 265 + Math.random() * 40 // 보라~파랑 계열
  });
}

function resetCycle() {
  state = 'counting';
  stateTime = 0;
  countdownValue = COUNTDOWN_SECONDS;
  beam = null;
  starX = STAR_MARGIN + Math.random() * (W - STAR_MARGIN * 2);
  starY = STAR_MARGIN + Math.random() * (H - STAR_MARGIN * 2);
}
resetCycle();

function drawGlowStar(x, y, radius, color, glow) {
  ctx.save();
  ctx.shadowBlur = glow;
  ctx.shadowColor = color;
  ctx.beginPath();
  ctx.fillStyle = color;
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();

  // 별 광선(네 방향 스파이크)
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.2;
  ctx.globalAlpha = 0.7;
  const spikes = radius * 4;
  ctx.beginPath();
  ctx.moveTo(x - spikes, y);
  ctx.lineTo(x + spikes, y);
  ctx.moveTo(x, y - spikes);
  ctx.lineTo(x, y + spikes);
  ctx.stroke();
  ctx.restore();
}

function updateAndDrawStarSystem(dt) {
  const x = STAR_POS.x();
  const y = STAR_POS.y();
  stateTime += dt;

  if (state === 'counting') {
    const elapsedSec = stateTime / 1000;
    countdownValue = Math.max(0, Math.ceil(COUNTDOWN_SECONDS - elapsedSec));
    const pulse = 1 + 0.15 * Math.sin(stateTime * 0.01);
    const fadeAlpha = Math.min(1, stateTime / STAR_FADE_IN_MS);

    ctx.save();
    ctx.globalAlpha = fadeAlpha;
    drawGlowStar(x, y, 16 * pulse, '#fff6da', 45);

    // 카운트다운 숫자
    ctx.font = '600 28px Segoe UI, Pretendard, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.textAlign = 'left';
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#fff6da';
    ctx.fillText(countdownValue > 0 ? String(countdownValue) : '', x + 34, y - 26);
    ctx.restore();

    if (elapsedSec >= COUNTDOWN_SECONDS) {
      state = 'bursting';
      stateTime = 0;
    }
  } else if (state === 'bursting') {
    const p = Math.min(1, stateTime / 260); // 0.26초 동안 폭발
    const ringR = 6 + p * 70;
    ctx.save();
    ctx.globalAlpha = 1 - p;
    ctx.strokeStyle = '#bfe9ff';
    ctx.lineWidth = 3;
    ctx.shadowBlur = 30;
    ctx.shadowColor = '#8fd7ff';
    ctx.beginPath();
    ctx.arc(x, y, ringR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // 별 자체는 급격히 밝아졌다 사라짐
    drawGlowStar(x, y, 16 + p * 16, '#ffffff', 55 * (1 - p * 0.3));

    if (p >= 1) {
      state = 'beaming';
      stateTime = 0;
      beam = {
        headDist: 0,
        dirX: Math.cos(BEAM_ANGLE),
        dirY: Math.sin(BEAM_ANGLE),
        originX: x,
        originY: y,
        fadeAlpha: 1,
        emitTimer: 0
      };
    }
  } else if (state === 'beaming') {
    beam.headDist += (BEAM_SPEED * dt) / 1000;

    const maxDist = Math.hypot(W, H) * 1.1;
    const headX = beam.originX + beam.dirX * beam.headDist;
    const headY = beam.originY + beam.dirY * beam.headDist;

    // 감마선이 진행하는 동안 옆으로 점을 계속 튀어나오게 함
    beam.emitTimer += dt;
    while (beam.emitTimer >= SIDE_DOT_EMIT_MS) {
      beam.emitTimer -= SIDE_DOT_EMIT_MS;
      if (sideDots.length < SIDE_DOT_MAX) {
        spawnSideDot(headX, headY, BEAM_ANGLE);
      }
    }

    // 감마선(빛나는 광선, 원점부터 head까지)
    ctx.save();
    ctx.globalAlpha = beam.fadeAlpha;
    ctx.strokeStyle = '#d9b3ff';
    ctx.shadowBlur = 35;
    ctx.shadowColor = '#b98cff';
    ctx.lineWidth = 3.2;
    ctx.beginPath();
    ctx.moveTo(beam.originX, beam.originY);
    ctx.lineTo(headX, headY);
    ctx.stroke();

    // 코어(더 밝고 얇은 흰빛 라인)
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.1;
    ctx.shadowBlur = 18;
    ctx.beginPath();
    ctx.moveTo(beam.originX, beam.originY);
    ctx.lineTo(headX, headY);
    ctx.stroke();

    // 선단부 광점
    drawGlowStar(headX, headY, 3.5, '#eaddff', 25);
    ctx.restore();

    if (beam.headDist >= maxDist) {
      state = 'fading';
      stateTime = 0;
    }
  } else if (state === 'fading') {
    const p = Math.min(1, stateTime / 500);
    beam.fadeAlpha = 1 - p;

    const headX = beam.originX + beam.dirX * beam.headDist;
    const headY = beam.originY + beam.dirY * beam.headDist;

    ctx.save();
    ctx.globalAlpha = beam.fadeAlpha;
    ctx.strokeStyle = '#d9b3ff';
    ctx.shadowBlur = 35;
    ctx.shadowColor = '#b98cff';
    ctx.lineWidth = 3.2;
    ctx.beginPath();
    ctx.moveTo(beam.originX, beam.originY);
    ctx.lineTo(headX, headY);
    ctx.stroke();
    ctx.restore();

    if (p >= 1) {
      // 잠시 대기 후 재시작
      if (stateTime > 500 + 1400) {
        resetCycle();
      }
    }
  }
}

function updateAndDrawSideDots(dt, now) {
  const dtSec = dt / 1000;
  const newlySpawned = [];
  const RIPPLE_HIT_BAND = 14; // 파동 링 두께(이 안에 들어오면 맞은 것으로 처리)

  for (let i = sideDots.length - 1; i >= 0; i--) {
    const d = sideDots[i];

    // 파동에 맞았는지 먼저 확인 - 맞으면 그대로 소멸
    let hitByRipple = false;
    for (const rp of ripples) {
      const dist = Math.hypot(d.x - rp.x, d.y - rp.y);
      if (Math.abs(dist - rp.r) < RIPPLE_HIT_BAND) {
        hitByRipple = true;
        break;
      }
    }
    if (hitByRipple) {
      sideDots.splice(i, 1);
      continue;
    }

    d.x += d.vx * dtSec;
    d.y += d.vy * dtSec;

    let bounced = false;

    if (d.x - d.r < 0) { d.x = d.r; d.vx *= -1; bounced = true; }
    else if (d.x + d.r > W) { d.x = W - d.r; d.vx *= -1; bounced = true; }

    if (d.y - d.r < 0) { d.y = d.r; d.vy *= -1; bounced = true; }
    else if (d.y + d.r > H) { d.y = H - d.r; d.vy *= -1; bounced = true; }

    if (bounced && sideDots.length + newlySpawned.length < SIDE_DOT_MAX) {
      // 벽에 부딪히면 살짝 다른 방향으로 튀는 복제본을 하나 더 만들어 2배로 늘림
      const jitter = (Math.random() - 0.5) * 0.9;
      const cos = Math.cos(jitter), sin = Math.sin(jitter);
      const nvx = d.vx * cos - d.vy * sin;
      const nvy = d.vx * sin + d.vy * cos;
      newlySpawned.push({
        x: d.x, y: d.y,
        vx: nvx, vy: nvy,
        r: d.r,
        born: now,
        hue: d.hue + (Math.random() - 0.5) * 20
      });
    }

    const age = now - d.born;
    const life = 1 - age / SIDE_DOT_LIFESPAN;
    if (life <= 0) {
      sideDots.splice(i, 1);
      continue;
    }

    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, life));
    ctx.fillStyle = `hsl(${d.hue}, 90%, 78%)`;
    ctx.shadowBlur = 12;
    ctx.shadowColor = `hsl(${d.hue}, 90%, 70%)`;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  if (newlySpawned.length) {
    for (const nd of newlySpawned) sideDots.push(nd);
  }
}

// ---------- 마우스 클릭 파동 효과 ----------
const ripples = [];
canvas.addEventListener('click', (e) => {
  ripples.push({
    x: e.clientX,
    y: e.clientY,
    r: 0,
    alpha: 0.9
  });
});

function updateAndDrawRipples(dt) {
  for (let i = ripples.length - 1; i >= 0; i--) {
    const rp = ripples[i];
    rp.r += (dt / 1000) * 260;
    rp.alpha -= dt / 1000 * 0.9;

    if (rp.alpha <= 0) {
      ripples.splice(i, 1);
      continue;
    }

    ctx.save();
    ctx.globalAlpha = Math.max(0, rp.alpha);
    ctx.strokeStyle = '#9fd8ff';
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#7ec8ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
    ctx.stroke();

    // 안쪽 보조 링
    ctx.globalAlpha = Math.max(0, rp.alpha * 0.5);
    ctx.beginPath();
    ctx.arc(rp.x, rp.y, rp.r * 0.6, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

// ---------- 메인 루프 ----------
let lastTime = performance.now();
function loop(now) {
  const dt = Math.min(50, now - lastTime); // dt 클램프(탭 전환 등 대비)
  lastTime = now;

  drawNebula(now);
  drawBgStars(now);
  updateAndDrawMeteors(dt);
  updateAndDrawStarSystem(dt);
  updateAndDrawSideDots(dt, now);
  updateAndDrawRipples(dt);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>

<script>
// ---------- 화면 전환 (인트로 -> 메인화면) ----------
const introContent = document.getElementById('intro-content');
const mainScreen = document.getElementById('main-screen');
const flashOverlay = document.getElementById('flash-overlay');
const enterBtn = document.getElementById('enter-btn');
const backBtn = document.getElementById('back-btn');

enterBtn.addEventListener('click', () => {
  introContent.classList.add('hide');
  flashOverlay.classList.remove('flash-active');
  void flashOverlay.offsetWidth; // 애니메이션 재시작을 위한 리플로우
  flashOverlay.classList.add('flash-active');
  setTimeout(() => {
    mainScreen.classList.add('show');
  }, 250);
});

backBtn.addEventListener('click', () => {
  mainScreen.classList.remove('show');
  introContent.classList.remove('hide');
});

// ---------- 단원 선택 메뉴 ----------
const unitItems = document.querySelectorAll('#unit-menu li');
const mainHeading = document.querySelector('.main-heading');
const mainEyebrow = document.querySelector('.main-eyebrow');

unitItems.forEach((item) => {
  item.addEventListener('click', () => {
    unitItems.forEach((el) => el.classList.remove('active'));
    item.classList.add('active');

    const title = item.dataset.title;
    const roman = item.dataset.roman;

    mainHeading.textContent = title;
    mainHeading.setAttribute('data-text', title);
    mainEyebrow.textContent = `// UNIT ${roman} SELECTED`;

    triggerGlitchBurst();
  });
});

const mainInner = document.querySelector('.main-inner');
const scanlinesEl = document.querySelector('.scanlines');

function triggerGlitchBurst() {
  mainHeading.classList.remove('glitch-burst');
  mainInner.classList.remove('shake');
  scanlinesEl.classList.remove('glitch-flicker');
  void mainHeading.offsetWidth; // 리플로우로 애니메이션 재시작
  mainHeading.classList.add('glitch-burst');
  mainInner.classList.add('shake');
  scanlinesEl.classList.add('glitch-flicker');

  setTimeout(() => {
    mainHeading.classList.remove('glitch-burst');
    mainInner.classList.remove('shake');
    scanlinesEl.classList.remove('glitch-flicker');
  }, 520);
}
</script>
